name: sero_te_amavi_rust
version: 0.1.0
description: >-
  Rust-like extensions for dartz: match, unwrap, ifSome, ifOk, ifErr,
  isSome, isNone, isOk, isErr for Option and Either types.
repository: https://github.com/lgmarchi/sero-te-amavi-rust
homepage: https://github.com/lgmarchi/sero-te-amavi-rust
documentation: https://github.com/lgmarchi/sero-te-amavi-rust#readme
license: MIT
topics:
  - functional-programming
  - rust
  - option
  - either
  - result
issue_tracker: https://github.com/lgmarchi/sero-te-amavi-rust/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  dartz: ^0.10.1

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
